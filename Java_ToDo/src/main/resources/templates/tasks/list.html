<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content">
    <h2 class="mb-3">All Tasks</h2>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <a th:href="@{/tasks/new}" class="btn btn-primary btn-sm me-2">+ Simple Task</a>
            <a th:href="@{/tasks/mega/new}" class="btn btn-outline-primary btn-sm">+ Mega Task</a>
        </div>
        <form th:action="@{/tasks}" method="get" class="d-flex gap-2">
            <input type="text" name="q" class="form-control form-control-sm"
                   placeholder="Search..." th:value="${q}">
            <button type="submit" class="btn btn-outline-secondary btn-sm">Search</button>
            <a th:if="${q != null and !#strings.isEmpty(q)}"
               th:href="@{/tasks}" class="btn btn-outline-danger btn-sm">✕</a>
        </form>
    </div>

    <div th:if="${tasks.isEmpty()}" class="alert alert-info">
        No tasks yet. <a th:href="@{/tasks/new}">Create one!</a>
    </div>

    <table th:if="${!tasks.isEmpty()}" class="table table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Title</th>
            <th>Status</th>
            <th>Type</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <th:block th:each="task, iterStat : ${tasks}">

            <tr>
                <td th:text="${iterStat.count}"></td>
                <td th:text="${task.title}"></td>
                <td>
                    <span th:text="${task.status}"
                          th:classappend="${task.status == 'Completed'} ? 'badge bg-success' : (${task.status == 'In progress'} ? 'badge bg-warning text-dark' : 'badge bg-secondary')">
                    </span>
                </td>
                <td>
                    <span th:text="${task.type == 'COMPOSITE'} ? 'Mega' : 'Simple'"
                          th:classappend="${task.type == 'COMPOSITE'} ? 'badge bg-info text-dark' : 'badge bg-light text-dark border'">
                    </span>
                </td>
                <td>
                    <form th:action="@{/tasks/{id}/status(id=${task.id})}" method="post" class="d-inline-flex align-items-center gap-1">
                        <select name="status" class="form-select form-select-sm" style="width:auto"
                                onchange="this.form.submit()">
                            <option value="NOT_STARTED"    th:selected="${task.status == 'Not started'}">Not started</option>
                            <option value="IN_PROGRESS"    th:selected="${task.status == 'In progress'}">In progress</option>
                            <option value="COMPLETED"      th:selected="${task.status == 'Completed'}">Completed</option>
                        </select>
                    </form>
                    <a th:href="@{/tasks/{id}/edit(id=${task.id})}" class="btn btn-outline-secondary btn-sm ms-1">Edit</a>
                    <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post" class="d-inline ms-1">
                        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                    </form>
                </td>
            </tr>

            <tr th:each="sub : ${task.subTask}"
                th:if="${task.type == 'COMPOSITE'}"
                class="table-light">
                <td></td>
                <td class="ps-4">↳ <span th:text="${sub.title}"></span></td>
                <td>
                    <span th:text="${sub.status}"
                          th:classappend="${sub.status == 'Completed'} ? 'badge bg-success' : (${sub.status == 'In progress'} ? 'badge bg-warning text-dark' : 'badge bg-secondary')">
                    </span>
                </td>
                <td><span class="badge bg-light text-dark border">Subtask</span></td>
                <td>
                    <form th:action="@{/tasks/{megaId}/subtasks/{subId}/status(megaId=${task.id}, subId=${sub.id})}"
                          method="post" class="d-inline-flex align-items-center gap-1">
                        <select name="status" class="form-select form-select-sm" style="width:auto"
                                onchange="this.form.submit()">
                            <option value="NOT_STARTED" th:selected="${sub.status == 'Not started'}">Not started</option>
                            <option value="IN_PROGRESS" th:selected="${sub.status == 'In progress'}">In progress</option>
                            <option value="COMPLETED"   th:selected="${sub.status == 'Completed'}">Completed</option>
                        </select>
                    </form>
                    <a th:href="@{/tasks/{megaId}/subtasks/{subId}/edit(megaId=${task.id}, subId=${sub.id})}"
                       class="btn btn-outline-secondary btn-sm ms-1">Edit</a>
                </td>
            </tr>

        </th:block>
        </tbody>
    </table>
</div>
</body>
</html>
